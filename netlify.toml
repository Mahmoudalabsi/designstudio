# ───────────────────────────────────────────────────────────
#  إعدادات Netlify - مصمم الصور
# ───────────────────────────────────────────────────────────

# مجلد النشر (الجذر)
[build]
  publish = "."
  functions = "functions"

# إعدادات الرؤوس الأمنية
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# رؤوس خاصة بملفات المصادقة (منع التخزين المؤقت)
[[headers]]
  for = "/auth-config.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/auth.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# رؤوس CORS لـ Netlify Functions
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Authorization, Content-Type"

# ─── Design Studio Reverse Proxy ───
# توجيه /studio/* إلى تطبيق Render
[[redirects]]
  from = "/studio"
  to = "https://design-converter-app.onrender.com/"
  status = 200
  force = true

[[redirects]]
  from = "/studio/*"
  to = "https://design-converter-app.onrender.com/:splat"
  status = 200
  force = true
